name: Check Upstream and Trigger Build

on:
  schedule:
    - cron: '0 3 * * *'          # 每天 UTC 3:00 检查一次（北京时间 11:00），可改成 '0 */6 * * *' 每6小时
  workflow_dispatch:             # 允许手动触发测试

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0           # 需要完整历史来比较 commit

      - name: Set up Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Add upstream remote (immortalwrt 示例，根据你的 env.REPO_URL 改)
        run: |
          git remote add upstream ${{ env.REPO_URL }} || true   # env.REPO_URL = https://github.com/immortalwrt/immortalwrt
          git fetch upstream ${{ env.REPO_BRANCH }}             # env.REPO_BRANCH = openwrt-24.10

      - name: Get latest upstream commit hash
        id: upstream
        run: |
          UPSTREAM_HASH=$(git rev-parse upstream/${{ env.REPO_BRANCH }})
          echo "UPSTREAM_HASH=$UPSTREAM_HASH" >> $GITHUB_OUTPUT

      - name: Get last recorded upstream hash (from file or env)
        id: last
        run: |
          LAST_HASH=$(cat .github/last-upstream-hash.txt 2>/dev/null || echo "none")
          echo "LAST_HASH=$LAST_HASH" >> $GITHUB_OUTPUT

      - name: Compare and decide
        id: decide
        run: |
          if [ "${{ steps.upstream.outputs.UPSTREAM_HASH }}" != "${{ steps.last.outputs.LAST_HASH }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New upstream changes detected!"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes in upstream."
          fi

      - name: Update recorded hash (if changed)
        if: steps.decide.outputs.changed == 'true'
        run: |
          echo "${{ steps.upstream.outputs.UPSTREAM_HASH }}" > .github/last-upstream-hash.txt
          git add .github/last-upstream-hash.txt
          git commit -m "chore: update upstream hash to ${{ steps.upstream.outputs.UPSTREAM_HASH }}"
          git push

      - name: Trigger your build workflow (only if upstream changed)
        if: steps.decide.outputs.changed == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT }}
          repository: kxhubs/Actions-OpenWrt
          event-type: trigger-build
          client-payload: '{"ref": "${{ env.REPO_BRANCH }}", "reason": "upstream updated"}'