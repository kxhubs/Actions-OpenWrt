name: ImmortalWrt Builder

on:
  push:
    tags:
    - 'v*'
  watch:
    types: [started]
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: scripts/diy-part1.sh
  DIY_P2_SH: scripts/diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  SERVERCHAN_SCKEY: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - { arch: R4S, config: immortalwrt_R4S, tag: immortalwrt_R4S }
          - { arch: x86_64, config: immortalwrt_x64, tag: immortalwrt_x64 }
    env:
      CONFIG_FILE: config/${{ matrix.target.config }}
      RELEASE_TAG: ${{ matrix.target.tag }}

    steps:

    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: true
        
    - name: Checkout
      uses: actions/checkout@v6

    - name: Check Server Performance(检查服务器性能)
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT
        
    - name: TG Message
      if: env.SERVERCHAN_SCKEY == 'true'
      run: |
        curl -k --data chat_id=${{ secrets.TGID }} --data "text=主人：正在为您编译新的$RELEASE_TAG-$(date +"%Y.%m.%d-%H%M"),请耐心等待...... 😋💐" "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage"
        
    - name: PUSHPLUS Message
      if: env.SERVERCHAN_SCKEY == 'true'
      run: |
        curl -k --data token="${{ secrets.PUSH_PLUS_TOKEN }}" --data title="开始编译$RELEASE_TAG-$(date +"%Y.%m.%d-%H%M")" --data "content=🎉 主人：正在为您编译新的$RELEASE_TAG-$(date +"%Y.%m.%d-%H%M"),请耐心等待...... 😋💐" "http://www.pushplus.plus/send"
 
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
         sudo -E apt-get -qq install $(curl -fsSL is.gd/depends_ubuntu_2204) python3-pyelftools
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        
    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        
    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
       if: env.UPLOAD_BIN_DIR == 'true' && success()
      with:
        name: OpenWrt_bin_${{ matrix.target.arch }}${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
       if: env.UPLOAD_FIRMWARE == 'true' && success()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
       if: success()
      with:
        name: OpenWrt_firmware_${{ matrix.target.arch }}${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        
    - name: Generate release tag with upstream changelog
      id: tag
       if: env.UPLOAD_RELEASE == 'true' && success()
      run: |
        echo "release_tag=${{ matrix.target.tag }}_$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "# 🎉 ImmortalWrt 固件自动更新" >> release.txt
        echo "" >> release.txt
        if [ -d "openwrt/.git" ]; then
          cd openwrt
          UPSTREAM_HASH=$(git rev-parse HEAD)
          UPSTREAM_SUBJECT=$(git log -1 --format=%s)
          UPSTREAM_DATE=$(git log -1 --format=%cd --date=format:'%Y-%m-%d %H:%M:%S')
          cd ..
          echo "## 📌 基于以下 ImmortalWrt 上游版本构建：" >> release.txt
          echo "- **Commit Hash**: \`$UPSTREAM_HASH\`" >> release.txt
          echo "- **提交时间**: $UPSTREAM_DATE" >> release.txt
          echo "- **提交说明**: $UPSTREAM_SUBJECT" >> release.txt
          echo "" >> release.txt
        fi
        echo "---" >> release.txt
        echo "" >> release.txt
        echo "### 📦 固件详细信息" >> release.txt
        echo "- **构建时间**: $(date +'%Y-%m-%d %H:%M:%S')" >> release.txt
        echo "- **构建号**: #${{ github.run_number }}" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v3
       if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.PAT }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2.1.0
      env:
        GITHUB_TOKEN: ${{ secrets.PAT }}
      with:
        retain_days: 1
        keep_minimum_runs: 3

   - name: TG Message
       if: env.SERVERCHAN_SCKEY == 'true' && success()
      run: |
         curl -k --data chat_id=${{ secrets.TGID }} --data "text=✅ 我亲爱的主人您要编译的$RELEASE_TAG-$(date +"%Y.%m.%d-%H%M")固件编译成功！" "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage"
        
   - name: PUSHPLUS Message
       if: env.SERVERCHAN_SCKEY == 'true' && success()
      run: |
         curl -k --data token="${{ secrets.PUSH_PLUS_TOKEN }}" --data title="✅ 恭喜主人$RELEASE_TAG-$(date +"%Y.%m.%d-%H%M")固件编译成功！" --data "content=✅ 我亲爱的主人您要编译的$RELEASE_TAG-$(date +"%Y.%m.%d-%H%M")固件成功完成了！" "http://www.pushplus.plus/send"
 
     - name: TG Message (fail)
       if: env.SERVERCHAN_SCKEY == 'true' && failure()
       run: |
         curl -k --data chat_id=${{ secrets.TGID }} --data "text=❌ 主人：$RELEASE_TAG-$(date +"%Y.%m.%d-%H%M") 编译失败，请检查日志！" "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage"
 
     - name: PUSHPLUS Message (fail)
       if: env.SERVERCHAN_SCKEY == 'true' && failure()
       run: |
         curl -k --data token="${{ secrets.PUSH_PLUS_TOKEN }}" --data title="❌ 主人：$RELEASE_TAG-$(date +"%Y.%m.%d-%H%M") 编译失败" --data "content=❌ 主人：$RELEASE_TAG-$(date +"%Y.%m.%d-%H%M") 编译失败，请检查日志！" "http://www.pushplus.plus/send"
